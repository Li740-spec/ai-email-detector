<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Phishing Email Detector — Cyber Mode</title>

<!-- SweetAlert2 -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<!-- Fonts (system fallback) -->
<style>
:root{
  --bg:#0b0f14;            /* dark background */
  --panel:#0f1720;         /* card */
  --muted:#99a1ad;
  --accent:#00b4ff;        /* neon cyan */
  --accent-2:#0066ff;      /* darker accent */
  --success:#2dd4bf;
  --danger:#ff6b6b;
  --glass: rgba(255,255,255,0.03);
  --radius:14px;
  --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, "Roboto Mono", "Courier New", monospace;
  --sans: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
}

/* Light theme variables (will be set when .light class on body) */
body.light {
  --bg:#f5f7fb;
  --panel:#ffffff;
  --muted:#566272;
  --accent:#0066ff;
  --accent-2:#0047b3;
  --glass: rgba(0,0,0,0.03);
}

/* Base layout */
*{box-sizing:border-box}
html,body{height:100%;margin:0;font-family:var(--sans);background:linear-gradient(180deg,var(--bg),#04060a);color:#dbe6ff}
.container{
  width:100%;
  max-width:820px;
  margin:36px auto;
  padding:28px;
  border-radius:var(--radius);
  background:linear-gradient(180deg, rgba(255,255,255,0.02), transparent);
  backdrop-filter: blur(6px);
  border:1px solid rgba(255,255,255,0.03);
  box-shadow: 0 10px 30px rgba(2,6,23,0.6), 0 2px 6px rgba(0,180,255,0.03) inset;
}

/* header */
.header{
  display:flex;
  gap:16px;
  align-items:center;
  justify-content:space-between;
  margin-bottom:18px;
}
.brand{
  display:flex;
  gap:12px;
  align-items:center;
}
.logo {
  width:52px;height:52px;border-radius:10px;
  background: linear-gradient(135deg,var(--accent),var(--accent-2));
  display:flex;align-items:center;justify-content:center;color:#001;
  box-shadow:0 6px 20px rgba(0,180,255,0.12);
  font-weight:700;font-family:var(--mono);
}
.title{
  font-size:18px;color:var(--accent);
  font-weight:700;
  letter-spacing:0.6px;
}
.subtitle{font-size:12px;color:var(--muted)}

/* body layout */
.grid{
  display:grid;
  grid-template-columns: 1fr 360px;
  gap:18px;
  align-items:start;
}

/* left: input card */
.card{
  background:var(--panel);
  border-radius:12px;
  padding:18px;
  border:1px solid rgba(255,255,255,0.03);
}
.label{font-size:13px;color:var(--muted);margin-bottom:8px}
textarea#email_text{
  width:100%;
  min-height:260px;
  resize:vertical;
  padding:12px 14px;
  border-radius:10px;
  background:transparent;
  color:inherit;
  border:1px dashed rgba(255,255,255,0.04);
  outline:none;
  font-family:inherit;
  font-size:14px;
}
textarea#email_text:focus{box-shadow:0 8px 30px rgba(0,180,255,0.06);border-color:rgba(0,180,255,0.18)}

/* controls */
.controls{display:flex;gap:12px;margin-top:12px}
.btn{
  padding:10px 14px;border-radius:10px;border:none;cursor:pointer;font-weight:700;
  color:#041022;background:linear-gradient(90deg,var(--accent),var(--accent-2));
  box-shadow: 0 8px 20px rgba(0,180,255,0.08);
}
.btn.secondary{background:transparent;color:var(--muted);border:1px solid rgba(255,255,255,0.03)}

/* right: info panel */
.info{
  display:flex;flex-direction:column;gap:12px;
}
.stat{
  background:linear-gradient(180deg, rgba(255,255,255,0.02), transparent);
  padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,0.03);
}
.stat h4{margin:0;color:var(--accent);font-size:13px}
.stat p{margin:6px 0 0;color:var(--muted);font-size:13px}

/* scan animation */
.scan-area{
  margin-top:10px;height:72px;border-radius:10px;border:1px solid rgba(255,255,255,0.03);
  display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;background:linear-gradient(90deg, rgba(0,0,0,0.06), transparent);
}
.scan-bar{
  position:absolute;left:-40%;top:0;height:100%;width:40%;
  background: linear-gradient(90deg, rgba(0,180,255,0.04), rgba(0,180,255,0.35), rgba(0,180,255,0.04));
  transform: skewX(-18deg);
  transition:all 0.3s ease;
  filter:blur(8px);
}
.scan-on .scan-bar{animation:scanMove 1.2s linear infinite}
@keyframes scanMove{0%{left:-60%}50%{left:60%}100%{left:160%}}

/* small helpers */
.small{font-size:13px;color:var(--muted)}
.badge{display:inline-block;padding:6px 10px;border-radius:8px;background:rgba(255,255,255,0.02);font-weight:700;color:var(--accent);border:1px solid rgba(255,255,255,0.03)}

/* toggle */
.toggleRow{display:flex;align-items:center;gap:10px}
.switch{
  width:48px;height:28px;border-radius:28px;background:rgba(255,255,255,0.04);position:relative;cursor:pointer;border:1px solid rgba(255,255,255,0.03)
}
.knob{width:22px;height:22px;border-radius:22px;background:#fff;position:absolute;top:3px;left:3px;transition:all .25s ease;box-shadow:0 8px 20px rgba(0,0,0,0.6)}
.switch.on{background:linear-gradient(90deg,var(--accent),var(--accent-2))}
.switch.on .knob{left:23px;background:#001b2e}

/* responsive */
@media(max-width:880px){
  .grid{grid-template-columns:1fr; }
  .info{order:2}
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="brand">
      <div class="logo">PH</div>
      <div>
        <div class="title">Phishing Email Detector</div>
        <div class="subtitle small">AI Agent — 自動偵測釣魚郵件（中英文支援）</div>
      </div>
    </div>

    <div style="display:flex;align-items:center;gap:12px">
      <div class="toggleRow small" title="深淺模式">
        <div class="small" style="color:var(--muted)">Dark</div>
        <div id="themeSwitch" class="switch on" role="button" aria-pressed="true">
          <div class="knob"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="grid">
    <!-- left: main card -->
    <div class="card">
      <div class="label">請貼上郵件內容（支援中文 / 英文）</div>
      <textarea id="email_text" placeholder="範例：您的帳戶存在風險，請點擊以下連結驗證..."></textarea>

      <div class="controls">
        <button id="analyzeBtn" class="btn">開始分析</button>
        <button id="clearBtn" class="btn secondary">清除</button>
      </div>

      <div class="scan-area" id="scanArea">
        <div class="scan-bar"></div>
        <div style="position:relative;z-index:2;color:var(--muted);font-weight:700">等待分析 — 點擊「開始分析」開始掃描</div>
      </div>

    </div>

    <!-- right: info -->
    <div class="info">
      <div class="stat">
        <h4>狀態</h4>
        <p class="small" id="statusText">系統準備就緒</p>
      </div>

      <div class="stat">
        <h4>建議測試範例</h4>
        <p class="small">1) 中文釣魚：您的銀行帳戶有風險，請點我：https://fake-bank.example</p>
        <p class="small">2) 正常郵件：老師好，這是我的作業。</p>
      </div>

      <div class="stat">
        <h4>快速指令</h4>
        <p class="small">按 <span class="badge">開始分析</span> 後會顯示 SweetAlert 判定結果</p>
      </div>
    </div>
  </div>
</div>

<script>
/* -------------------------
   Theme toggle (dark/light)
   -------------------------*/
const themeSwitch = document.getElementById('themeSwitch');
function setLight(on){
  if(on){
    document.body.classList.add('light');
    themeSwitch.classList.remove('on');
    themeSwitch.setAttribute('aria-pressed','false');
  } else {
    document.body.classList.remove('light');
    themeSwitch.classList.add('on');
    themeSwitch.setAttribute('aria-pressed','true');
  }
}
// Default dark
setLight(false);

themeSwitch.addEventListener('click', ()=>{
  const isOn = themeSwitch.classList.contains('on');
  setLight(isOn); // toggle
});

/* -------------------------
   Elements
   -------------------------*/
const analyzeBtn = document.getElementById('analyzeBtn');
const clearBtn = document.getElementById('clearBtn');
const emailText = document.getElementById('email_text');
const scanArea = document.getElementById('scanArea');
const statusText = document.getElementById('statusText');

/* -------------------------
   Helper: show loading / scanning
   -------------------------*/
function startScanUI(){
  scanArea.classList.add('scan-on');
  statusText.textContent = '掃描中… 分析郵件特徵與連結';
  analyzeBtn.disabled = true;
  analyzeBtn.style.opacity = 0.6;
}
function stopScanUI(){
  scanArea.classList.remove('scan-on');
  statusText.textContent = '分析完成';
  analyzeBtn.disabled = false;
  analyzeBtn.style.opacity = 1;
}

/* -------------------------
   Analyze click handler
   -------------------------*/
analyzeBtn.addEventListener('click', async ()=>{
  const text = emailText.value || '';
  if(!text.trim()){
    Swal.fire({icon:'warning', title:'請輸入郵件內容！'});
    return;
  }

  // start UI
  startScanUI();

  // small UX delay
  await new Promise(r=>setTimeout(r, 350));

  try {
    // send to backend
    const form = new FormData();
    form.append('email_text', text);

    const resp = await fetch('/predict', {method:'POST', body: form});
    if(!resp.ok) throw new Error('Network response not ok');

    const data = await resp.json();
    stopScanUI();

    // 1.判斷結果
    const isPhish = (data.result === '釣魚' || data.result === 'Phishing');
    const prob = typeof data.prob === 'number' ? (data.prob*100).toFixed(1) : '?';

    //2.處理網址分析報告(新增部分)
    let urlHtml = '';
    if (data.url_info && data.url_info.length > 0) {
        urlHtml = `
            <div style="text-align:left; margin-top:15px; padding:12px; background:rgba(255,255,255,0.03); border-radius:10px; border:1px solid rgba(255,255,255,0.05);">
                <div style="color:var(--accent); font-weight:700; margin-bottom:10px; font-size:14px; display:flex; align-items:center; gap:6px;">
                    <span>🔗</span> 網址深度掃描報告
                </div>`;
        
        data.url_info.forEach(item => {
            if (item.is_shortened) {
                // 如果偵測到縮網址，使用紅色警示樣式
                urlHtml += `
                    <div style="margin-bottom:10px; font-size:13px; border-left:3px solid var(--danger); padding-left:10px;">
                        <span style="color:var(--danger); font-weight:700;">[警示] 發現隱藏跳轉 (縮網址)</span><br>
                        <span style="color:var(--muted); font-size:12px;">原始連結：</span><code style="color:var(--muted)">${item.original}</code><br>
                        <span style="color:var(--success); font-weight:700;">真實目標：${item.real_url}</span><br>
                        <code style="word-break:break-all; color:var(--accent); background:rgba(0,180,255,0.05); padding:2px 4px; border-radius:4px;">${item.real_url}</code>
                    </div>`;
            } else {
                // 一般網址顯示綠色正常樣式
                urlHtml += `
                    <div style="margin-bottom:8px; font-size:13px; border-left:3px solid var(--success); padding-left:10px;">
                        <span style="color:var(--success); font-weight:700;">[正常]</span> 
                        <code style="word-break:break-all; color:var(--muted);">${item.original}</code>
                    </div>`;
            }
        });
        urlHtml += `</div>`;
    }

    // 3.建立 SweetAlert 標題、icon、footer
    let title = isPhish ? `⚠ 偵測到疑似釣魚 (機率 ${prob}%)` : `✔ 郵件看起來安全 (機率 ${prob}%)`;
    let icon = isPhish ? 'error' : 'success';
    let footer = isPhish 
        ? '<span style="color:var(--danger)； font-weight:700">建議:此郵件含有高風險特徵，請勿點擊連結或提供個人資訊。</span>'
        : '建議:此郵件目前判定為安全，仍請保持警覺。'
    //4.顯示彈窗
    Swal.fire({
      title: title,
      icon: icon,
      html: `
        <div style="text-align:left; white-space:pre-wrap; font-size:14px; max-height:120px; overflow-y:auto; padding:10px; background:rgba(0,0,0,0.2); border-radius:8px; border:1px solid rgba(255,255,255,0.05); color:#dbe6ff;">${escapeHtml(text)}</div>
        ${urlHtml}
        <hr style="border:0; border-top:1px solid rgba(255,255,255,0.1); margin:15px 0;">
        <div style="text-align:left; font-size:13px;">${footer}</div>
      `, 
      width: 720,
      background: 'var(--panel)',
      color: '#dbe6ff',
      confirmButtonColor: 'var(--accent)'
    });

  } catch (err){
    stopScanUI();
    console.error(err);
    Swal.fire({icon:'error', title:'伺服器錯誤', text: err.message || ''});
  }
});

/* -------------------------
   Clear button
   -------------------------*/
clearBtn.addEventListener('click', ()=>{
  emailText.value = '';
  statusText.textContent = '已清除';
});

/* -------------------------
   escape for HTML display
   -------------------------*/
function escapeHtml(str){
  return str
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;')
    .replaceAll('"','&quot;')
    .replaceAll("'",'&#39;');
}

/* -------------------------
   Keyboard shortcut: Ctrl+Enter -> analyze
   -------------------------*/
emailText.addEventListener('keydown', (e)=>{
  if(e.ctrlKey && e.key === 'Enter') analyzeBtn.click();
});
</script>


</body>
</html>
